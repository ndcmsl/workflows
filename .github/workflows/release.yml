name: Release node
on:
  workflow_call:
    secrets:
      token:
        required: true
    inputs:
      is-microservice:
        required: false
        default: false
        type: boolean
      ignored-path-prefix:
        description: 'Skip the main release when every changed file is inside this prefix.'
        required: false
        default: 'package_src'
        type: string

concurrency:
  group: release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.token }}
  NPM_TOKEN: ${{ secrets.token }}
  NODE_AUTH_TOKEN: ${{ secrets.token }}
  IS_MICROSERVICE: ${{ inputs.is-microservice }}
jobs:
  detect-release-scope:
    name: Detect main release scope
    runs-on: microservicios
    outputs:
      should-release: ${{ steps.scope.outputs.should-release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed files for main release
        id: scope
        env:
          IGNORED_PATH_PREFIX: ${{ inputs.ignored-path-prefix }}
        run: |
          set -e

          if [ "${{ github.event_name }}" != "push" ] || [ -z "$IGNORED_PATH_PREFIX" ]; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git show --pretty="" --name-only "$AFTER")
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHOULD_RELEASE="false"
          while IFS= read -r changed_file; do
            [ -z "$changed_file" ] && continue

            case "$changed_file" in
              "${IGNORED_PATH_PREFIX%/}/"*)
                ;;
              *)
                SHOULD_RELEASE="true"
                break
                ;;
            esac
          done <<< "$CHANGED_FILES"

          echo "should-release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

  release:
    if: ${{ needs.detect-release-scope.outputs.should-release == 'true' && (github.event_name != 'push' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'Initial commit'))) }}
    needs: detect-release-scope
    name: Release
    runs-on: microservicios
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set repository name
        run: echo REPO_NAME=$(echo ${{ github.repository }} | cut -d "/" -f 2) >> $GITHUB_ENV
      - name: Sync branch before releasing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git pull --rebase origin ${{ github.ref_name }}
      # - name: Setup Node.js
      #   uses: actions/setup-node@v5
      #   with:
      #     node-version: '24.12.0'
      #     scope: "@ndcmsl"
      #     registry-url: "https://npm.pkg.github.com"
      #     cache: 'npm'
      # - name: Install npm v11.6.2 
      #   run: npm install -g npm@11.6.2
      - name: Install dependencies
        run: npm ci
      - name: Release
        run: npx semantic-release

      - name: Get tag microservice
        if: ${{ github.ref_name != 'dev' }}
        run: echo TAG_VERSION=$(git tag -l | sort -V | grep -i '^[1-9]' | tail -n 1) >> $GITHUB_ENV
      
      - name: Build proyect
        run: npm run build

      - name: Removing tsconfig.build file
        if: ${{ env.IS_MICROSERVICE == 'true' }}
        run: rm dist/tsconfig.build.tsbuildinfo

      - name: Compress build
        if: ${{ env.IS_MICROSERVICE == 'true' }}
        run: tar -czf dist.gz dist/*

      - name: Upload artifact main
        if: ${{ github.ref_name != 'dev' && env.IS_MICROSERVICE == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: main-${{ env.TAG_VERSION }}
          path: |
            dist.gz
      
