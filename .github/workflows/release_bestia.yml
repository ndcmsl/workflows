name: Release node
on:
  workflow_call:
    secrets:
      token:
        required: true
    inputs:
      is-microservice:
        required: false
        default: false
        type: boolean
env:
  IS_MICROSERVICE: ${{ inputs.is-microservice }}
  RELEASE_BOT_APP_ID: 4176453

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  release:
    if: "!contains(github.event.commits[0].message, 'Initial commit')"
    name: Release
    runs-on: microservicios
    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.token }}
          owner: ${{ github.repository_owner }}

      - name: Export release bot token
        run: |
          echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"
          echo "NPM_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"
          echo "NODE_AUTH_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Set repository name
        run: echo REPO_NAME=$(echo ${{ github.repository }} | cut -d "/" -f 2) >> $GITHUB_ENV
      - name: Fetch semantic-release notes
        run: |
          git config user.name "ndcmsl-release-bot[bot]"
          git config user.email "298005331+ndcmsl-release-bot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin +refs/notes/semantic-release:refs/notes/semantic-release || true
      # - name: Setup Node.js
      #   uses: actions/setup-node@v5
      #   with:
      #     node-version: '24.12.0'
      #     scope: "@ndcmsl"
      #     registry-url: "https://npm.pkg.github.com"
      #     cache: 'npm'
      # - name: Install npm v11.6.2 
      #   run: npm install -g npm@11.6.2
      - name: Install dependencies
        run: npm ci
      - name: Release
        run: npx semantic-release --repository-url "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Get tag microservice
        if: ${{ github.ref_name != 'dev' }}
        run: echo TAG_VERSION=$(git tag -l | sort -V | grep -i '^[1-9]' | tail -n 1) >> $GITHUB_ENV
      
      - name: Build proyect
        run: npm run build

      - name: Removing tsconfig.build file
        if: env.IS_MICROSERVICE == 'true'
        run: rm dist/tsconfig.build.tsbuildinfo

      - name: Compress build
        if: env.IS_MICROSERVICE == 'true'
        run: tar -czf dist.gz dist/*

      - name: Upload artifact main
        if: ${{ github.ref_name != 'dev' }} && env.IS_MICROSERVICE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: main-${{ env.TAG_VERSION }}
          path: |
            dist.gz
      
