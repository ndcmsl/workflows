name: Release node

on:
  workflow_call:
    secrets:
      token:
        required: true

env:
  GH_TOKEN: ${{ secrets.token }}
  NPM_TOKEN: ${{ secrets.token }}
  NODE_AUTH_TOKEN: ${{ secrets.token }}

jobs:
  release:
    name: Release
    runs-on: microservicios

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set repository name
        run: echo "REPO_NAME=$(echo '${{ github.repository }}' | cut -d '/' -f 2)" >> "$GITHUB_ENV"

      # - name: Setup Node.js
      #   uses: actions/setup-node@v5
      #   with:
      #     node-version: '24.12.0'
      #     scope: "@ndcmsl"
      #     registry-url: "https://npm.pkg.github.com"
      #     cache: 'npm'

      # - name: Install npm v11.6.2
      #   run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: npx semantic-release

      - name: Get tag maverick
        if: ${{ github.ref_name != 'dev' }}
        run: echo "TAG_VERSION=$(git tag -l | sort -V | grep -i '^[1-9]' | tail -n 1)" >> "$GITHUB_ENV"

      - name: Build project
        run: npm run build

      - name: Compress build
        run: tar -czf dist.gz dist/*

      - name: Runner diagnostics before upload
        if: ${{ github.ref_name != 'dev' }}
        run: |
          echo "=== DATE ==="
          date
          echo
          echo "=== UPTIME ==="
          uptime || true
          echo
          echo "=== CPU COUNT ==="
          nproc || true
          echo
          echo "=== MEMORY ==="
          free -h || true
          echo
          echo "=== DISK ==="
          df -h || true
          echo
          echo "=== ARTIFACT SIZE ==="
          ls -lh dist.gz
          echo
          echo "=== ARTIFACT HASH ==="
          sha256sum dist.gz || true

      - name: Upload artifact main
        if: ${{ github.ref_name != 'dev' }}
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ env.TAG_VERSION }}
          path: dist.gz
          compression-level: 0

      - name: Runner diagnostics after upload
        if: ${{ github.ref_name != 'dev' }}
        run: |
          echo "=== DATE AFTER UPLOAD ==="
          date
